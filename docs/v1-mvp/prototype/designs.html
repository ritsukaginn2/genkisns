<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GenkiSNS V1 UI Directions</title>
    <style>
      :root {
        color-scheme: light;
        --phone-width: 393px;
        --phone-height: 852px;
        --scale: 0.68;
        --bg: #ece9e3;
        --ink: #202326;
        --muted: #6e747a;
        --phone: #111316;
        --screen: #f8f7f4;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .stage {
        display: grid;
        gap: 16px;
        justify-items: center;
        padding: 24px;
      }

      .label { text-align: center; }
      .label h1 { margin: 0; font-size: 18px; line-height: 1.2; }
      .label p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }

      .phone-slot {
        width: calc(var(--phone-width) * var(--scale));
        height: calc(var(--phone-height) * var(--scale));
      }

      .phone {
        width: var(--phone-width);
        height: var(--phone-height);
        padding: 12px;
        border-radius: 44px;
        background: var(--phone);
        box-shadow: 0 24px 80px rgba(32, 35, 38, 0.24);
        transform: scale(var(--scale));
        transform-origin: top left;
      }

      .screen {
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 34px;
        background: var(--screen);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--screen);
      }

      @media (min-height: 820px) and (min-width: 720px) { :root { --scale: 0.78; } }
      @media (min-height: 980px) and (min-width: 840px) { :root { --scale: 0.9; } }
      @media (min-height: 1120px) and (min-width: 960px) { :root { --scale: 1; } }

      @media (max-width: 440px) {
        body { display: block; background: var(--screen); }
        .stage { padding: 0; }
        .label { display: none; }
        .phone-slot { width: 100vw; height: 100vh; }
        .phone {
          width: 100vw;
          height: 100vh;
          transform: none;
          padding: 0;
          border-radius: 0;
          box-shadow: none;
          background: var(--screen);
        }
        .screen { border-radius: 0; }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="label">
        <h1>GenkiSNS V1 UI Directions</h1>
        <p>Five Flutter UI directions for choosing the base feel</p>
      </div>
      <div class="phone-slot">
        <div class="phone" aria-label="phone preview frame">
          <div class="screen">
            <iframe title="GenkiSNS Flutter UI directions" src="../../../apps/mobile/build/web/index.html?view=designs&preview=20260502-2#/designs"></iframe>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
