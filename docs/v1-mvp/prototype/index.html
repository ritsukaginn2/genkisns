<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GenkiSNS V1 Prototype</title>
    <style>
      :root {
        color-scheme: light;
        --phone-width: 402px;
        --phone-height: 874px;
        --scale: 0.68;
        --bg: #ece9e3;
        --ink: #202326;
        --muted: #6e747a;
        --phone: #111316;
        --screen: #fff5f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .stage {
        display: grid;
        gap: 16px;
        justify-items: center;
        padding: 24px;
      }

      .label {
        text-align: center;
      }

      .label h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .label p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .label a {
        color: #e85d4f;
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
      }

      .phone-slot {
        width: calc(var(--phone-width) * var(--scale));
        height: calc(var(--phone-height) * var(--scale));
      }

      @media (min-height: 820px) and (min-width: 720px) {
        :root {
          --scale: 0.78;
        }
      }

      @media (min-height: 980px) and (min-width: 840px) {
        :root {
          --scale: 0.9;
        }
      }

      @media (min-height: 1120px) and (min-width: 960px) {
        :root {
          --scale: 1;
        }
      }

      .phone {
        width: var(--phone-width);
        height: var(--phone-height);
        padding: 12px;
        border-radius: 44px;
        background: var(--phone);
        box-shadow: 0 24px 80px rgba(32, 35, 38, 0.24);
        transform: scale(var(--scale));
        transform-origin: top left;
      }

      .screen {
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 34px;
        background: var(--screen);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--screen);
      }

      @media (max-width: 440px) {
        body {
          display: block;
          background: var(--screen);
        }

        .stage {
          padding: 0;
        }

        .label {
          display: none;
        }

        .phone {
          width: 100vw;
          height: 100vh;
          transform: none;
          padding: 0;
          border-radius: 0;
          box-shadow: none;
          background: var(--screen);
        }

        .screen {
          border-radius: 0;
        }

        .phone-slot {
          width: 100vw;
          height: 100vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="label">
        <h1>GenkiSNS V1 Flutter Preview</h1>
        <p>Flutter Web embedded in a phone frame</p>
        <p><a href="board.html">Open V1 design board</a></p>
        <p><a href="designs.html">Open UI lab directions</a></p>
      </div>
      <div class="phone-slot">
        <div class="phone" aria-label="phone preview frame">
          <div class="screen">
            <iframe title="GenkiSNS Flutter app" src="../../../apps/mobile/build/web/index.html"></iframe>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
